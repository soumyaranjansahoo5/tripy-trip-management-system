<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tripy — My Reviews</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav" id="navbar"></nav>

<div class="page-inner">
  <div class="pg-hdr">
    <div><h2>My Reviews</h2><p>Ratings and feedback you've shared</p></div>
    <a href="/trips.html" class="btn btn-sm">Review a Trip</a>
  </div>
  <div id="reviewsList"><div class="loader">Loading reviews…</div></div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script>
  requireAuth();
  renderNav('reviews');

  async function loadMyReviews() {
    document.getElementById('reviewsList').innerHTML = '<div class="loader">Loading…</div>';
    try {
      const d = await apiGet('/reviews/my');
      const reviews = d.data || [];
      if (!reviews.length) {
        document.getElementById('reviewsList').innerHTML = `
          <div class="empty"><div class="empty-icon">⭐</div>
            <h3>No reviews yet</h3>
            <p>Book a trip and share your experience</p>
            <a href="/trips.html" class="btn" style="margin-top:20px;display:inline-block">Explore Trips</a>
          </div>`;
        return;
      }
      document.getElementById('reviewsList').innerHTML = reviews.map(r => `
        <div class="review-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
            <div>
              <div class="rv-name" style="font-size:16px;margin-bottom:2px">${r.tripTitle}</div>
              <div class="rv-stars" style="font-size:18px">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)} <span style="font-size:13px;color:#888;font-family:'DM Sans',sans-serif">${r.rating}/5</span></div>
              ${r.comment ? `<div class="rv-comment" style="margin-top:8px">${r.comment}</div>` : ''}
              <div style="font-size:12px;color:#aaa;margin-top:8px">
                Reviewed on ${new Date(r.reviewDate).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}
              </div>
            </div>
            <button class="btn btn-sm btn-outline" style="border-color:#e74c3c;color:#e74c3c" onclick="deleteReview(${r.id})">Delete</button>
          </div>
        </div>`).join('');
    } catch { document.getElementById('reviewsList').innerHTML = '<div class="loader">Failed to load reviews.</div>'; }
  }

  async function deleteReview(id) {
    if (!confirm('Delete this review?')) return;
    try {
      const d = await apiDelete('/reviews/' + id);
      if (d.success) { toast('Review deleted'); loadMyReviews(); }
      else toast(d.message || 'Delete failed');
    } catch { toast('Error deleting review'); }
  }

  loadMyReviews();
</script>
</body>
</html>
