<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tripy — Sign In</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css"/>

  <style>
    .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
    .hero-left { background: #111; display: flex; align-items: center; justify-content: center; }
    .hero-left h1 { color: white; }
    .hero-right { display: flex; align-items: center; justify-content: center; }

    .auth-box { width: 100%; max-width: 400px; }
    .auth-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
    .tab { flex:1; padding:10px; cursor:pointer; border:none; background:none; }
    .tab.active { border-bottom:2px solid black; font-weight:bold; }

    .aform { display:none; }
    .aform.active { display:block; }

    input { width:100%; padding:10px; margin:8px 0; }

    .btn {
      width:100%;
      padding:10px;
      margin-top:10px;
      cursor:pointer;
      background:#c4622d;
      color:white;
      border:none;
    }

    .msg { margin-top:10px; }
    .err { color:red; }
    .success { color:green; }
  </style>
</head>

<body>

<div class="hero">
  <div class="hero-left">
    <h1>Tripy</h1>
  </div>

  <div class="hero-right">
    <div class="auth-box">

      <div class="auth-tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN -->
      <div class="aform active" id="loginForm">
        <form onsubmit="login(event)">
          <input type="email" id="lEmail" placeholder="Email" required/>
          <input type="password" id="lPass" placeholder="Password" required autocomplete="current-password"/>
          <button type="submit" class="btn">Login</button>
        </form>
        <div id="lMsg" class="msg"></div>
      </div>

      <!-- REGISTER -->
      <div class="aform" id="regForm">
        <form onsubmit="register(event)">
          <input type="text" id="rName" placeholder="Name" required/>
          <input type="email" id="rEmail" placeholder="Email" required/>
          <input type="password" id="rPass" placeholder="Password" required autocomplete="new-password"/>
          <button type="submit" class="btn">Register</button>
        </form>
        <div id="rMsg" class="msg"></div>
      </div>

    </div>
  </div>
</div>

<script>
const API = "https://tripy-trip-management-system-production.up.railway.app/api";

// HELPERS
function val(id){ return document.getElementById(id).value.trim(); }

function storeAuth(data){
  localStorage.setItem("tripy_token", data.token);
  localStorage.setItem("tripy_name", data.name);
  localStorage.setItem("tripy_role", data.role);
}

// SWITCH TAB
function switchTab(type){
  document.getElementById("loginForm").classList.toggle("active", type==="login");
  document.getElementById("regForm").classList.toggle("active", type==="register");

  document.querySelectorAll(".tab")[0].classList.toggle("active", type==="login");
  document.querySelectorAll(".tab")[1].classList.toggle("active", type==="register");
}

// LOGIN
async function login(e){
  e.preventDefault();

  console.log("🚀 Login clicked");

  const msg = document.getElementById("lMsg");
  msg.innerHTML = "Loading...";

  try{
    const res = await fetch(API + "/auth/login",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        email: val("lEmail"),
        password: val("lPass")
      })
    });

    console.log("Status:", res.status);

    const data = await res.json();
    console.log("Response:", data);

    if(data.success){
      storeAuth(data.data);
      msg.innerHTML = "Login successful ✅";
      msg.className = "msg success";

      setTimeout(() => {
        window.location.href = "/trips.html";
      }, 1000);
    } else {
      msg.innerHTML = data.message || "Invalid credentials";
      msg.className = "msg err";
    }

  } catch(err){
    console.error(err);
    msg.innerHTML = "Backend not reachable ❌";
    msg.className = "msg err";
  }
}

// REGISTER
async function register(e){
  e.preventDefault();

  console.log("🚀 Register clicked");

  const msg = document.getElementById("rMsg");
  msg.innerHTML = "Loading...";

  try{
    const res = await fetch(API + "/auth/register",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        name: val("rName"),
        email: val("rEmail"),
        password: val("rPass")
      })
    });

    console.log("Status:", res.status);

    const data = await res.json();
    console.log("Response:", data);

    if(data.success){
      storeAuth(data.data);
      msg.innerHTML = "Registered successfully ✅";
      msg.className = "msg success";

      setTimeout(() => {
        window.location.href = "/trips.html";
      }, 1000);
    } else {
      msg.innerHTML = data.message || "Registration failed";
      msg.className = "msg err";
    }

  } catch(err){
    console.error(err);
    msg.innerHTML = "Backend not reachable ❌";
    msg.className = "msg err";
  }
}
</script>

</body>
</html>
