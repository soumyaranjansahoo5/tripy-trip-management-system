# ==========================================
# Tripy - Application Configuration
# ==========================================

# ==========================================
# Server (IMPORTANT for deployment)
# ==========================================
server.port=${PORT:8080}

# ==========================================
# Database (Use ENV variables - DO NOT hardcode)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT Configuration
# ==========================================
app.jwt.secret=TripySecretKey2024TripySecretKey2024TripySecretKey2024TripySecretKey2024
app.jwt.expiration=86400000

# ==========================================
# Static Resources (Frontend)
# ==========================================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ==========================================
# Logging
# ==========================================
logging.level.com.tripy=DEBUG
logging.level.org.springframework.security=INFO
