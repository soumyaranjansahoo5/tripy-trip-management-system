<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tripy — Sign In</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css"/>

  <style>
    .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
    .hero-left { background: #111; display: flex; flex-direction: column; justify-content: space-between; padding: 48px; }
    .hero-right { background: #fff; display: flex; align-items: center; justify-content: center; padding: 48px; }
    .auth-box { width: 100%; max-width: 400px; }
    .auth-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
    .tab { flex:1; padding:10px; cursor:pointer; border:none; background:none; }
    .tab.active { border-bottom:2px solid black; font-weight:bold; }
    .aform { display:none; }
    .aform.active { display:block; }
    .btn { width:100%; padding:10px; margin-top:10px; cursor:pointer; }
    .msg { margin-top:10px; }
    .err { color:red; }
  </style>
</head>

<body>

<div class="hero">
  <div class="hero-left">
    <h1 style="color:white;">Tripy</h1>
  </div>

  <div class="hero-right">
    <div class="auth-box">

      <div class="auth-tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN -->
      <div class="aform active" id="loginForm">
        <input type="email" id="lEmail" placeholder="Email"/><br><br>
        <input type="password" id="lPass" placeholder="Password"/><br><br>
        <button class="btn" onclick="login()">Login</button>
        <div id="lMsg" class="msg"></div>
      </div>

      <!-- REGISTER -->
      <div class="aform" id="regForm">
        <input type="text" id="rName" placeholder="Name"/><br><br>
        <input type="email" id="rEmail" placeholder="Email"/><br><br>
        <input type="password" id="rPass" placeholder="Password"/><br><br>
        <button class="btn" onclick="register()">Register</button>
        <div id="rMsg" class="msg"></div>
      </div>

    </div>
  </div>
</div>

<script>
const API = "https://tripy-trip-management-system-production.up.railway.app/api";

// ── HELPERS
function val(id){ return document.getElementById(id).value.trim(); }

function storeAuth(data){
  localStorage.setItem("tripy_token", data.token);
}

// ── SWITCH TAB
function switchTab(type){
  document.getElementById("loginForm").classList.toggle("active", type==="login");
  document.getElementById("regForm").classList.toggle("active", type==="register");

  document.querySelectorAll(".tab")[0].classList.toggle("active", type==="login");
  document.querySelectorAll(".tab")[1].classList.toggle("active", type==="register");
}

// ── LOGIN
async function login(){
  const msg = document.getElementById("lMsg");
  msg.innerHTML="";

  try{
    const res = await fetch(API+"/auth/login",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        email: val("lEmail"),
        password: val("lPass")
      })
    });

    const data = await res.json();

    if(data.success){
      storeAuth(data.data);
      window.location.href="/trips.html";
    }else{
      msg.innerHTML = data.message;
      msg.className="msg err";
    }

  }catch(err){
    console.error(err);
    msg.innerHTML="Server error. Try again.";
    msg.className="msg err";
  }
}

// ── REGISTER
async function register(){
  const msg = document.getElementById("rMsg");
  msg.innerHTML="";

  try{
    const res = await fetch(API+"/auth/register",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        name: val("rName"),
        email: val("rEmail"),
        password: val("rPass")
      })
    });

    const data = await res.json();

    if(data.success){
      storeAuth(data.data);
      window.location.href="/trips.html";
    }else{
      msg.innerHTML=data.message;
      msg.className="msg err";
    }

  }catch(err){
    console.error(err);
    msg.innerHTML="Server error. Try again.";
    msg.className="msg err";
  }
}
</script>

</body>
</html>
