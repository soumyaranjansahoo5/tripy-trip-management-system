<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tripy — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .tf-grid .fld { margin-bottom: 12px; }
    .tf-full { grid-column: 1 / -1; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav" id="navbar"></nav>

<div class="page-inner">
  <div class="pg-hdr">
    <div><h2>Admin Dashboard</h2><p>Manage trips, bookings and users</p></div>
  </div>

  <div class="page-tabs">
    <button class="ptab active" id="tab-btn-dashboard"   onclick="switchTab('dashboard')">📊 Dashboard</button>
    <button class="ptab"        id="tab-btn-manageTrips" onclick="switchTab('manageTrips')">✈️ Manage Trips</button>
    <button class="ptab"        id="tab-btn-allBookings" onclick="switchTab('allBookings')">📋 All Bookings</button>
  </div>

  <!-- DASHBOARD TAB -->
  <div class="ptab-content active" id="tab-dashboard">
    <div class="dash-grid" id="dashStats"><div class="loader">Loading stats…</div></div>
    <div class="section-title">Recent Bookings</div>
    <div id="recentBookings"><div class="loader">Loading…</div></div>
  </div>

  <!-- MANAGE TRIPS TAB -->
  <div class="ptab-content" id="tab-manageTrips">
    <button class="btn btn-sm" style="margin-bottom:20px" onclick="openTripForm(null)">+ Add New Trip</button>
    <div id="adminTripsList"><div class="loader">Loading trips…</div></div>
  </div>

  <!-- ALL BOOKINGS TAB -->
  <div class="ptab-content" id="tab-allBookings">
    <div id="allBookingsList"><div class="loader">Loading bookings…</div></div>
  </div>
</div>

<!-- TRIP FORM MODAL -->
<div class="overlay" id="tripFormModal">
  <div class="modal" style="max-width:580px">
    <button class="modal-close" onclick="closeModal('tripFormModal')">✕</button>
    <h3 id="tf-heading">Add Trip</h3>
    <div class="modal-sub">Fill in all trip details below</div>
    <input type="hidden" id="tf-id"/>
    <div class="tf-grid">
      <div class="fld tf-full"><label>Title</label><input type="text" id="tf-title" placeholder="e.g. Goa Beach Tour"/></div>
      <div class="fld tf-full"><label>Description</label><textarea id="tf-desc" placeholder="Describe the trip experience…"></textarea></div>
      <div class="fld"><label>Source (From)</label><input type="text" id="tf-src" placeholder="e.g. Mumbai"/></div>
      <div class="fld"><label>Destination (To)</label><input type="text" id="tf-dest" placeholder="e.g. Goa"/></div>
      <div class="fld"><label>Start Date</label><input type="date" id="tf-start"/></div>
      <div class="fld"><label>End Date</label><input type="date" id="tf-end"/></div>
      <div class="fld"><label>Price Per Person (₹)</label><input type="number" id="tf-price" placeholder="e.g. 8500"/></div>
      <div class="fld"><label>Available Seats</label><input type="number" id="tf-seats" placeholder="e.g. 20"/></div>
      <div class="fld tf-full"><label>Image URL</label><input type="text" id="tf-img" placeholder="https://example.com/image.jpg"/></div>
      <div class="fld"><label>Status</label>
        <select id="tf-status">
          <option value="ACTIVE">ACTIVE</option>
          <option value="INACTIVE">INACTIVE</option>
          <option value="COMPLETED">COMPLETED</option>
          <option value="CANCELLED">CANCELLED</option>
        </select>
      </div>
    </div>
    <button class="btn btn-full" onclick="saveTrip()" style="margin-top:8px">Save Trip</button>
    <div class="msg" id="tf-msg"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script>
  requireAdmin();
  renderNav('admin');

  // ── TAB SWITCHING ──
  function switchTab(name) {
    document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.ptab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-btn-' + name).classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'dashboard')   loadDashboard();
    if (name === 'manageTrips') loadAdminTrips();
    if (name === 'allBookings') loadAllBookings();
  }

  // ── DASHBOARD ──
  async function loadDashboard() {
    try {
      const d = await apiGet('/admin/dashboard');
      const ds = d.data;
      document.getElementById('dashStats').innerHTML = `
        <div class="dash-card"><div class="dash-num">${ds.totalTrips}</div><div class="dash-lbl">Total Trips</div></div>
        <div class="dash-card"><div class="dash-num">${ds.activeTrips}</div><div class="dash-lbl">Active Trips</div></div>
        <div class="dash-card"><div class="dash-num">${ds.totalBookings}</div><div class="dash-lbl">Total Bookings</div></div>
        <div class="dash-card"><div class="dash-num">${ds.confirmedBookings}</div><div class="dash-lbl">Confirmed</div></div>
        <div class="dash-card"><div class="dash-num">${ds.cancelledBookings}</div><div class="dash-lbl">Cancelled</div></div>
        <div class="dash-card"><div class="dash-num">${ds.totalUsers}</div><div class="dash-lbl">Total Users</div></div>
        <div class="dash-card revenue"><div class="dash-num">₹${fmt(ds.totalRevenue)}</div><div class="dash-lbl">Total Revenue</div></div>`;

      const rb = ds.recentBookings || [];
      document.getElementById('recentBookings').innerHTML = rb.length
        ? rb.map(b => `
          <div class="bk-card" style="margin-bottom:10px">
            <div>
              <div class="bk-title">${b.tripTitle}</div>
              <div class="bk-meta">👤 ${b.userName} &nbsp;|&nbsp; 📍 ${b.destination} &nbsp;|&nbsp; 👥 ${b.numberOfPersons} persons &nbsp;|&nbsp; 💰 ₹${fmt(b.totalCost)}</div>
            </div>
            <span class="bk-badge bk-${b.status}">${b.status}</span>
          </div>`).join('')
        : '<div class="empty" style="padding:40px"><h3>No bookings yet</h3></div>';
    } catch { toast('Failed to load dashboard'); }
  }

  // ── MANAGE TRIPS ──
  async function loadAdminTrips() {
    document.getElementById('adminTripsList').innerHTML = '<div class="loader">Loading…</div>';
    try {
      const d = await apiGet('/admin/trips');
      const trips = d.data || [];
      if (!trips.length) { document.getElementById('adminTripsList').innerHTML = '<div class="empty"><h3>No trips yet</h3></div>'; return; }
      document.getElementById('adminTripsList').innerHTML = trips.map(t => `
        <div class="bk-card" style="margin-bottom:12px">
          <div>
            <div class="bk-title">${t.title}</div>
            <div class="bk-meta">
              📍 ${t.source} → ${t.destination}<br>
              📅 ${fmtDate(t.startDate)} to ${fmtDate(t.endDate)} · ${t.durationDays} days<br>
              💰 ₹${fmt(t.pricePerPerson)}/person &nbsp;|&nbsp; 💺 ${t.availableSeats} seats left
            </div>
            <div style="display:flex;gap:8px;margin-top:12px">
              <button class="btn btn-sm btn-outline" onclick='openTripForm(${JSON.stringify(t)})'>✏️ Edit</button>
              <button class="btn btn-sm btn-outline" style="border-color:#e74c3c;color:#e74c3c" onclick="deleteTrip(${t.id})">🗑 Delete</button>
            </div>
          </div>
          <span class="status-tag st-${t.status}">${t.status}</span>
        </div>`).join('');
    } catch { toast('Failed to load trips'); }
  }

  function openTripForm(t) {
    document.getElementById('tf-msg').className = 'msg';
    if (t) {
      document.getElementById('tf-heading').textContent = 'Edit Trip';
      document.getElementById('tf-id').value     = t.id;
      document.getElementById('tf-title').value  = t.title || '';
      document.getElementById('tf-desc').value   = t.description || '';
      document.getElementById('tf-src').value    = t.source || '';
      document.getElementById('tf-dest').value   = t.destination || '';
      document.getElementById('tf-start').value  = t.startDate || '';
      document.getElementById('tf-end').value    = t.endDate || '';
      document.getElementById('tf-price').value  = t.pricePerPerson || '';
      document.getElementById('tf-seats').value  = t.availableSeats || '';
      document.getElementById('tf-img').value    = t.imageUrl || '';
      document.getElementById('tf-status').value = t.status || 'ACTIVE';
    } else {
      document.getElementById('tf-heading').textContent = 'Add New Trip';
      ['tf-id','tf-title','tf-desc','tf-src','tf-dest','tf-start','tf-end','tf-price','tf-seats','tf-img'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('tf-status').value = 'ACTIVE';
    }
    openModal('tripFormModal');
  }

  async function saveTrip() {
    const msgEl = document.getElementById('tf-msg'); msgEl.className = 'msg';
    const id = document.getElementById('tf-id').value;
    const body = {
      title: val('tf-title'), description: val('tf-desc'),
      source: val('tf-src'), destination: val('tf-dest'),
      startDate: val('tf-start'), endDate: val('tf-end'),
      pricePerPerson: parseFloat(val('tf-price')),
      availableSeats: parseInt(val('tf-seats')),
      imageUrl: val('tf-img'), status: val('tf-status')
    };
    try {
      const d = id ? await apiPut('/trips/' + id, body) : await apiPost('/trips', body);
      if (d.success) { closeModal('tripFormModal'); toast(id ? '✅ Trip updated!' : '✅ Trip created!'); loadAdminTrips(); }
      else { msgEl.textContent = d.message || 'Save failed'; msgEl.className = 'msg err'; }
    } catch { msgEl.textContent = 'Error saving trip'; msgEl.className = 'msg err'; }
  }

  async function deleteTrip(id) {
    if (!confirm('Cancel/delete this trip? It will be marked as CANCELLED.')) return;
    try {
      const d = await apiDelete('/trips/' + id);
      if (d.success) { toast('Trip cancelled'); loadAdminTrips(); }
      else toast(d.message || 'Delete failed');
    } catch { toast('Error deleting trip'); }
  }

  // ── ALL BOOKINGS ──
  async function loadAllBookings() {
    document.getElementById('allBookingsList').innerHTML = '<div class="loader">Loading…</div>';
    try {
      const d = await apiGet('/admin/bookings');
      const bks = d.data || [];
      if (!bks.length) { document.getElementById('allBookingsList').innerHTML = '<div class="empty"><h3>No bookings yet</h3></div>'; return; }
      document.getElementById('allBookingsList').innerHTML = bks.map(b => `
        <div class="bk-card" style="margin-bottom:12px">
          <div>
            <div class="bk-title">${b.tripTitle}</div>
            <div class="bk-meta">
              👤 <strong>${b.userName}</strong> (${b.userEmail})<br>
              📍 ${b.source} → ${b.destination}<br>
              👥 ${b.numberOfPersons} persons &nbsp;|&nbsp; 💰 ₹${fmt(b.totalCost)}<br>
              🕐 ${new Date(b.bookingDate).toLocaleDateString('en-IN')} &nbsp;|&nbsp; Payment: <strong>${b.paymentStatus}</strong>
              ${b.specialRequests ? `<br>📝 ${b.specialRequests}` : ''}
            </div>
          </div>
          <div class="bk-right">
            <span class="bk-badge bk-${b.status}">${b.status}</span>
            <span class="pay-badge pay-${b.paymentStatus}">${b.paymentStatus}</span>
          </div>
        </div>`).join('');
    } catch { toast('Failed to load bookings'); }
  }

  // Load dashboard by default
  loadDashboard();
</script>
</body>
</html>
